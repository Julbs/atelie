<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#1a3d28">
<title>🧶 Ateliê da Jhuli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gd:#1a3d28;--gm:#2d5a3d;--ga:#4a8c5c;--gl:#d4ead9;--gp:#f0f7f2;--cr:#faf7f2;--cw:#fff9f4;--td:#1a1a1a;--tm:#4a4a4a;--tl:#7a7a7a;--bo:#e2ddd6;--am:#c8740a;--al:#fef3e2;--ro:#9b3a5a;--rl:#fdf0f4;--ra:16px;--rs:10px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--cr);color:var(--td);min-height:100vh;overscroll-behavior:none}
.header{background:var(--gd);padding:18px 18px 0;position:sticky;top:0;z-index:50;box-shadow:0 2px 24px rgba(0,0,0,.3)}
.ht{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.htitle{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:#fff;letter-spacing:-.3px}
.hsub{font-size:11px;color:rgba(255,255,255,.5);font-weight:300;margin-top:2px}
.sw{position:relative;margin-bottom:12px}
.sw svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
#search{width:100%;height:40px;border-radius:20px;border:none;background:rgba(255,255,255,.12);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;padding:0 16px 0 38px;outline:none;transition:background .2s}
#search::placeholder{color:rgba(255,255,255,.4)}
#search:focus{background:rgba(255,255,255,.20)}
.cs{display:flex;gap:8px;overflow-x:auto;padding-bottom:14px;scrollbar-width:none}
.cs::-webkit-scrollbar{display:none}
.cb{flex-shrink:0;border:1.5px solid rgba(255,255,255,.22);background:transparent;color:rgba(255,255,255,.65);font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 16px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .18s}
.cb.active{background:#fff;border-color:#fff;color:var(--gd);font-weight:500}
.content{padding:14px 14px 100px;max-width:680px;margin:0 auto}
.sl{display:flex;align-items:center;gap:8px;margin:20px 0 10px}
.sl-t{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--tl)}
.sl-l{flex:1;height:1px;background:var(--bo)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.card{background:var(--cw);border-radius:var(--ra);overflow:hidden;box-shadow:0 2px 14px rgba(26,61,40,.09);border:1px solid var(--bo);cursor:pointer;transition:transform .16s;animation:fu .28s ease both}
.card:active{transform:scale(.97)}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ciw{position:relative;height:115px;overflow:hidden;background:var(--gp)}
.ci{width:100%;height:100%;object-fit:cover;display:block}
.cpp{position:absolute;top:7px;left:7px;font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.cb2{padding:10px 11px 11px}
.cn{font-size:13px;font-weight:500;color:var(--td);line-height:1.35;margin-bottom:7px;min-height:34px}
.cch{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px}
.ch{font-size:10px;padding:2px 7px;border-radius:8px}
.df{background:#e6f4ee;color:#1a5c35}.di{background:var(--al);color:#8c500a}.da{background:var(--rl);color:#7a2a45}.dn{background:#f0ece6;color:var(--tm)}
.ce{display:flex;gap:5px}
.eb{flex:1;background:var(--gp);border-radius:8px;padding:5px;text-align:center}
.el{font-size:9px;color:var(--tl);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:1px}
.ev{font-size:12px;font-weight:500;color:var(--gm)}
.cb3{font-size:12px;color:var(--tl);margin-bottom:4px;text-align:right}
.empty{text-align:center;padding:48px 20px;color:var(--tl);font-size:14px}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:200;align-items:flex-end;justify-content:center}
.mo.open{display:flex;animation:bi .18s ease}
@keyframes bi{from{opacity:0}to{opacity:1}}
.md{background:var(--cw);border-radius:22px 22px 0 0;width:100%;max-width:700px;max-height:95vh;display:flex;flex-direction:column;animation:su .22s ease}
@keyframes su{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 14px 0}
.modal-handle{width:36px;height:4px;background:var(--bo);border-radius:2px}
.modal-actions{display:flex;gap:6px;align-items:center}
.modal-btn{display:flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--bo);background:var(--cw);color:var(--tm);white-space:nowrap;transition:all .15s}
.modal-btn:active{transform:scale(.96)}
.modal-btn.dl{background:var(--gd);color:#fff;border-color:var(--gd)}
.modal-tabs{flex-shrink:0;display:flex;border-bottom:1px solid var(--bo);padding:0 14px;margin-top:6px}
.mtab{flex:1;padding:10px 0;font-size:13px;color:var(--tl);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;text-align:center}
.mtab.active{color:var(--gm);font-weight:500;border-bottom-color:var(--gm)}
.modal-body{flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.tab-resumo{padding:14px 16px 40px}
.modal-hero{width:100%;height:190px;object-fit:cover;border-radius:var(--rs);margin-bottom:12px;display:block}
.mhc{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.mt{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;line-height:1.2;margin-bottom:12px}
.me{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.mec{background:var(--gp);border-radius:var(--rs);padding:11px 13px;border:1px solid var(--gl)}
.mel{font-size:10px;color:var(--tl);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.mev{font-size:17px;font-weight:500;color:var(--gd)}
.mes{font-size:11px;color:var(--tl);margin-top:1px}
.mst{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--tl);margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--bo)}
.mr{display:flex;gap:10px;font-size:13px;padding:6px 0;border-bottom:1px solid var(--bo);align-items:flex-start}
.mr:last-child{border-bottom:none}
.mrl{color:var(--tl);min-width:80px;flex-shrink:0;padding-top:1px}
.mrv{color:var(--td);line-height:1.45}
.msec{margin-bottom:14px}
.tab-receita{padding:0 0 40px}
.zoom-bar{position:sticky;top:0;z-index:10;background:var(--cw);border-bottom:1px solid var(--bo);display:flex;align-items:center;justify-content:center;gap:12px;padding:9px 16px}
.zoom-info{font-size:13px;color:var(--tm);min-width:46px;text-align:center;font-weight:500}
.zoom-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--bo);background:var(--cw);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gm);font-weight:500;transition:all .15s;line-height:1}
.zoom-btn:active{background:var(--gl);transform:scale(.93)}
.zoom-reset{font-size:11px;color:var(--gm);cursor:pointer;font-weight:500;padding:5px 12px;border-radius:12px;background:var(--gp);border:1px solid var(--gl)}
.pages-wrap{padding:0}
.pdf-page{margin:0;border-bottom:3px solid var(--bo)}
.page-header{padding:7px 14px;background:var(--gp);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bo)}
.page-label{font-size:11px;color:var(--tl);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.page-num{font-size:10px;color:var(--tl)}
.page-img-wrap{width:100%;overflow-x:auto;overflow-y:hidden;background:#fff;-webkit-overflow-scrolling:touch;min-height:200px}
.page-img-wrap img{display:block;height:auto}
.img-ph{width:100%;min-height:300px;display:flex;align-items:center;justify-content:center;color:var(--tl);font-size:13px;background:var(--gp);flex-direction:column;gap:10px}
.spinner{width:28px;height:28px;border:3px solid var(--gl);border-top-color:var(--gm);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-pages-msg{text-align:center;padding:40px 20px;color:var(--tl)}
.load-pages-msg .spinner{margin:0 auto 14px}
.load-pages-msg p{font-size:13px}
.hc{color:#2d6b40}.hm{color:var(--ro)}.ha{color:var(--am)}
.bg-c{background:linear-gradient(135deg,#c8e6d2,#a8d4ba)}.bg-m{background:linear-gradient(135deg,#f4c6d4,#e8a8bc)}.bg-a{background:linear-gradient(135deg,#fde8c0,#f8d090)}
.pc{background:rgba(255,255,255,.82);color:#1a4d28}.pm{background:rgba(255,255,255,.82);color:#7a1a3a}.pa{background:rgba(255,255,255,.82);color:#7a4d00}
</style>
</head>
<body>
<div class="header">
  <div class="ht">
    <div><div class="htitle">🧶 Ateliê da Jhuli</div><div class="hsub">Repositório de receitas de crochê</div></div>
  </div>
  <div class="sw">
    <svg width="16" height="16" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="search" placeholder="Buscar receita ou fio..." oninput="render()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="cs" id="cats"></div>
</div>
<div class="content">
  <div class="cb3" id="count"></div>
  <div id="main"></div>
</div>
<div class="mo" id="modal" onclick="hb(event)">
  <div class="md" id="mbox">
    <div class="modal-bar">
      <div style="width:10px"></div>
      <div class="modal-handle"></div>
      <div class="modal-actions">
        <button class="modal-btn dl" id="dl-btn" onclick="dlPDF()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> PDF
        </button>
        <button class="modal-btn" onclick="cm()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Fechar
        </button>
      </div>
    </div>
    <div class="modal-tabs">
      <button class="mtab active" id="tab-r-btn" onclick="st('r')">Resumo</button>
      <button class="mtab" id="tab-p-btn" onclick="st('p')">Receita completa</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div id="tab-r" class="tab-resumo"></div>
      <div id="tab-p" class="tab-receita" style="display:none">
        <div class="zoom-bar">
          <button class="zoom-btn" onclick="zO()" aria-label="Diminuir">−</button>
          <span class="zoom-info" id="zl">100%</span>
          <button class="zoom-btn" onclick="zI()" aria-label="Aumentar">+</button>
          <span class="zoom-reset" onclick="zR()">Resetar</span>
        </div>
        <div class="pages-wrap" id="pw"></div>
      </div>
    </div>
  </div>
</div>

const DC={Fácil:"df",Intermediário:"di",Avançado:"da"};

let ac="Todas",curR=null,curZoom=100,obs=null,pagesBuilt=false,pagesLoading=false;
window.PAGES=null;

function rCats(){
  document.getElementById("cats").innerHTML=["Todas","Casa","Moda","Amigurumi"].map(c=>
    `<button class="cb${ac===c?" active":""}" onclick="sc('${c}')">${c}</button>`).join("");
}
function sc(c){ac=c;rCats();render();}

function render(){
  const q=(document.getElementById("search").value||"").toLowerCase().trim();
  const fl=R.filter(r=>{
    const mc=ac==="Todas"||r.c===ac;
    const mq=!q||[r.n,r.f,r.s,r.c,r.p].some(v=>v.toLowerCase().includes(q));
    return mc&&mq;
  });
  document.getElementById("count").textContent=`${fl.length} receita${fl.length!==1?"s":""} encontrada${fl.length!==1?"s":""}`;
  if(!fl.length){document.getElementById("main").innerHTML=`<div class="empty">🧶<br><br>Nenhuma receita encontrada.</div>`;return;}
  const g={};
  fl.forEach(r=>{if(!g[r.c])g[r.c]={};if(!g[r.c][r.s])g[r.c][r.s]=[];g[r.c][r.s].push(r);});
  let h="";
  for(const c in g)for(const s in g[c]){
    h+=`<div class="sl"><span class="sl-t ${HC[c]||""}">${c} · ${s}</span><span class="sl-l"></span></div><div class="grid">`;
    g[c][s].forEach((r,i)=>{
      h+=`<div class="card" onclick="om(${R.indexOf(r)})" role="button" tabindex="0" style="animation-delay:${i*.04}s">
        <div class="ciw"><img class="ci" src="${THUMBS[r.id]||""}" alt="${r.n}" loading="lazy"><div class="cpp ${r.pc}">${r.s}</div></div>
        <div class="cb2">
          <div class="cn">${r.n}</div>
          <div class="cch"><span class="ch ${DC[r.d]||""}">${r.d}</span><span class="ch dn">${r.a}</span></div>
          <div class="ce">
            <div class="eb"><span class="el">⏱ Tempo</span><span class="ev">${r.tm}</span></div>
            <div class="eb"><span class="el">💰 Custo</span><span class="ev">${r.cu}</span></div>
          </div>
        </div>
      </div>`;
    });
    h+="</div>";
  }
  document.getElementById("main").innerHTML=h;
}

function applyZoom(){
  document.getElementById("zl").textContent=curZoom+"%";
  document.querySelectorAll(".page-img-wrap img").forEach(img=>img.style.width=curZoom+"%");
}
function zI(){curZoom=Math.min(curZoom+25,300);applyZoom();}
function zO(){curZoom=Math.max(curZoom-25,75);applyZoom();}
function zR(){curZoom=100;applyZoom();}

function setupObs(){
  if(obs)obs.disconnect();
  obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting)return;
      const w=e.target,src=w.dataset.src;
      if(!src)return;
      const img=new Image();
      img.onload=()=>{img.style.width=curZoom+"%";img.style.maxWidth="none";img.style.height="auto";w.innerHTML="";w.appendChild(img);delete w.dataset.src;obs.unobserve(w);};
      img.src=src;
    });
  },{rootMargin:"300px"});
  document.querySelectorAll(".page-img-wrap[data-src]").forEach(el=>obs.observe(el));
}

function buildPages(r){
  if(!window.PAGES||!window.PAGES[r.id]){return;}
  const pages=window.PAGES[r.id];
  let h="";
  pages.forEach((p,i)=>{
    h+=`<div class="pdf-page">
      <div class="page-header"><span class="page-label">${p.label}</span><span class="page-num">${i+1}/${pages.length}</span></div>
      <div class="page-img-wrap" data-src="${p.img}"><div class="img-ph"><div class="spinner"></div></div></div>
    </div>`;
  });
  document.getElementById("pw").innerHTML=h;
  setTimeout(setupObs,80);
  pagesBuilt=true;
}

function loadPagesScript(callback){
  if(window.PAGES){callback();return;}
  if(pagesLoading){document.addEventListener("pagesReady",callback,{once:true});return;}
  pagesLoading=true;
  document.getElementById("pw").innerHTML=`<div class="load-pages-msg"><div class="spinner"></div><p>Carregando receita completa…<br><small>Primeira vez pode demorar alguns segundos</small></p></div>`;
  const s=document.createElement("script");
  s.src="pages_data.js";
  s.onload=()=>{pagesLoading=false;callback();};
  s.onerror=()=>{document.getElementById("pw").innerHTML=`<div class="load-pages-msg"><p>❌ Erro ao carregar. Verifique sua conexão e tente novamente.</p></div>`;};
  document.head.appendChild(s);
}

function st(tab){
  document.getElementById("tab-r-btn").className="mtab"+(tab==="r"?" active":"");
  document.getElementById("tab-p-btn").className="mtab"+(tab==="p"?" active":"");
  document.getElementById("tab-r").style.display=tab==="r"?"block":"none";
  document.getElementById("tab-p").style.display=tab==="p"?"block":"none";
  document.getElementById("modal-body").scrollTop=0;
  if(tab==="p"&&curR&&!pagesBuilt){
    loadPagesScript(()=>buildPages(curR));
  }
}

function dlPDF(){
  if(!curR)return;
  const btn=document.getElementById("dl-btn");
  btn.textContent="⏳ ...";btn.disabled=true;
  function go(){
    const pages=window.PAGES&&window.PAGES[curR.id];
    if(!pages){btn.textContent="PDF";btn.disabled=false;return;}
    function loadJsPDF(cb){
      if(window.jspdf){cb();return;}
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
      s.onload=cb;document.head.appendChild(s);
    }
    loadJsPDF(()=>{
      const{jsPDF}=window.jspdf;
      const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
      const pw=210,ph=297;
      let done=0;
      const srcs=pages.map(p=>p.img);
      const els=srcs.map((src,i)=>{
        const im=new Image();
        im.onload=()=>{
          done++;
          if(done===srcs.length){
            els.forEach((im2,j)=>{
              if(j>0)doc.addPage();
              const r2=im2.naturalHeight/im2.naturalWidth;
              const iw=Math.min(pw,ph/r2);
              doc.addImage(im2.src,"JPEG",(pw-iw)/2,0,iw,iw*r2,undefined,"FAST");
            });
            doc.save(curR.n.replace(/[^a-zA-ZÀ-ÿ0-9 ]/g,"-")+".pdf");
            btn.innerHTML=`<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> PDF`;
            btn.disabled=false;
          }
        };
        im.src=src;return im;
      });
    });
  }
  if(window.PAGES){go();}else{loadPagesScript(go);}
}

function om(idx){
  const r=R[idx];curR=r;curZoom=100;pagesBuilt=false;
  document.getElementById("zl").textContent="100%";
  document.getElementById("pw").innerHTML="";
  document.getElementById("tab-r").innerHTML=`
    <img class="modal-hero" src="${THUMBS[r.id]||""}" alt="${r.n}">
    <div class="mhc ${HC[r.c]||""}">${r.c} · ${r.s}</div>
    <div class="mt">${r.n}</div>
    <div class="me">
      <div class="mec"><div class="mel">⏱ Tempo estimado</div><div class="mev">${r.tm}</div><div class="mes">horas de trabalho</div></div>
      <div class="mec"><div class="mel">💰 Custo estimado</div><div class="mev">${r.cu}</div><div class="mes">${r.cd}</div></div>
    </div>
    <div class="msec">
      <div class="mst">Materiais e execução</div>
      <div class="mr"><span class="mrl">Fio</span><span class="mrv">${r.f}</span></div>
      <div class="mr"><span class="mrl">Agulha</span><span class="mrv">${r.a}</span></div>
      <div class="mr"><span class="mrl">Tamanho</span><span class="mrv">${r.t}</span></div>
      <div class="mr"><span class="mrl">Dificuldade</span><span class="mrv"><span class="ch ${DC[r.d]||""}" style="font-size:12px">${r.d}</span></span></div>
      <div class="mr"><span class="mrl">Pontos</span><span class="mrv">${r.p}</span></div>
      <div class="mr"><span class="mrl">Artesã</span><span class="mrv">${r.ar}</span></div>
    </div>`;
  const btn=document.getElementById("dl-btn");
  btn.innerHTML=`<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> PDF`;
  btn.disabled=false;
  st("r");
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow="hidden";
}
function cm(){document.getElementById("modal").classList.remove("open");document.body.style.overflow="";if(obs)obs.disconnect();}
function hb(e){if(e.target.id==="modal")cm();}
document.addEventListener("keydown",e=>{if(e.key==="Escape")cm();});
rCats();render();
</script>
